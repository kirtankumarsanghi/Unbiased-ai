# Kubernetes backend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: equiaudit

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: equiaudit/backend:latest

          ports:
            - containerPort: 8000

          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/equiaudit

            - name: REDIS_URL
              value: redis://redis:6379
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: equiaudit

spec:
  selector:
    app: backend

  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000