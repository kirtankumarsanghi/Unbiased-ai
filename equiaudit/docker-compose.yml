version: "3.9"

services:
  frontend:
    build:
      context: ./frontend

    ports:
      - "5173:5173"

    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

    depends_on:
      - backend

  backend:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/equiaudit
      - REDIS_URL=redis://redis:6379

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15

    restart: always

    environment:
      POSTGRES_DB: equiaudit

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  nginx:
    build:
      context: ./infrastructure/nginx

    ports:
      - "80:80"

    depends_on:
      - frontend
      - backend